<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word game current version</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fffff0;
  color: #222;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  gap: 24px;
  align-items: center;
  flex-wrap: wrap;
  padding: 12px 16px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.controls {
  margin-left: auto;
}

button {
  padding: 8px 12px;
  border: 1px solid #bbb;
  border-radius: 10px;
  background: white;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #f2f2f2;
}

.viewport {
  height: calc(100vh - 70px);
  overflow: auto;
  padding: 16px;
}

.board {
  min-width: 2800px;
  min-height: 1200px;
  padding: 12px;
}

.section-title {
  margin: 6px 0 10px;
  font-size: 13px;
  font-weight: bold;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.completed-grid {
  display: grid;
  grid-template-columns: repeat(10, max-content);
  gap: 12px;
  align-content: flex-start;
  justify-content: flex-start;
  margin-bottom: 20px;
  min-height: 20px;
}

.rows {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.row {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  min-height: 52px;
  width: max-content;
}

.tile {
  display: inline-flex;
  position: relative;
  align-items: flex-start;
  justify-content: center;
  overflow: visible;

  min-height: 34px;
  width: fit-content;
  min-width: 0;
  max-width: 260px;
  padding: 6px 9px;
  border: 1px solid #999;
  border-radius: 8px;
  background: white;
  cursor: pointer;
  font-size: 14px;
  line-height: 1.2;
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: break-word;
  transition:
    transform 0.12s ease,
    box-shadow 0.12s ease,
    background-color 0.25s ease,
    border-color 0.25s ease;
  user-select: none;
}

.tile:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.tile.selected {
  outline: 3px solid #4a90e2;
}

.tile.completed {
  font-weight: bold;
  border-width: 3px;
  min-height: 38px;
}

.tile.merged {
  border-width: 3px;
  max-width: 215px;
}

.tile.merged[data-tooltip]:hover {
  z-index: 200;
}

.tile-count {
  flex: 0 0 auto;
  margin-right: 5px;
  font-weight: 700;
}

.tile-text {
  display: -webkit-box;
  min-width: 0;
  overflow: hidden;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
  text-align: left;
}

.tile.merged[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  left: 0;
  top: calc(100% + 8px);
  z-index: 201;
  max-width: 360px;
  min-width: min(280px, 80vw);
  padding: 8px 10px;
  border: 1px solid #222;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.98);
  box-shadow: 0 8px 22px rgba(0,0,0,0.16);
  color: #222;
  font-size: 13px;
  line-height: 1.35;
  font-weight: 400;
  text-align: left;
  white-space: normal;
  pointer-events: none;
  opacity: 0;
  visibility: hidden;
  transition:
    opacity 0.12s ease 0s,
    visibility 0s linear 0.12s;
}

.tile.merged[data-tooltip]:hover::after {
  opacity: 1;
  visibility: visible;
  transition:
    opacity 0.12s ease 1s,
    visibility 0s linear 1s;
}

body.is-dragging .tile.merged[data-tooltip]::after {
  opacity: 0;
  visibility: hidden;
  transition: none;
}

.drag-preview {
  position: fixed;
  left: -1000px;
  top: -1000px;
  z-index: -1;
  overflow: hidden;
  pointer-events: none;
}

.confetti-canvas {
  position: fixed;
  inset: 0;
  z-index: 300;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.tile.shake {
  animation: shake 0.28s linear 1;
}
button.active-level {
  background: #6f4e37;
  color: white;
  border-color: #6f4e37;
}

.tile.draggable {
  cursor: grab;
}

.tile.dragging {
  opacity: 0.45;
}

.tile.drop-before {
  box-shadow: -6px 0 0 #4a90e2;
}

.tile.drop-after {
  box-shadow: 6px 0 0 #4a90e2;
}

#mistakes {
  color: transparent;
  user-select: text;
}

#mistakes::selection {
  color: white;
  background: #6f4e37;
}

.mistakes-hidden {
  color: transparent;
  user-select: text;
}

.mistakes-hidden::selection {
  color: white;
  background: #6f4e37;
}

.mistakes-hidden::-moz-selection {
  color: white;
  background: #6f4e37;
}

@keyframes shake {
  0%   { transform: translateX(0); }
  20%  { transform: translateX(-3px); }
  40%  { transform: translateX(3px); }
  60%  { transform: translateX(-2px); }
  80%  { transform: translateX(2px); }
  100% { transform: translateX(0); }
}
</style>
</head>

/* =========================================
   СОСТОЯНИЕ
   ========================================= */

let currentLevelId = localStorage.getItem("word-game-current-level") || "level1";

function getCurrentLevel() {
  return LEVELS[currentLevelId] || LEVELS.level1;
}

let STORAGE_KEY = getCurrentLevel().storageKey;
const SIZE = GAME_DATA.wordsPerCategory;
const ITEMS_PER_ROW = GAME_DATA.itemsPerRow;
const WORD_SEPARATOR = GAME_DATA.wordSeparator;
let categories = getCurrentLevel().categories;

let groups = {};
let activeRows = [];
let completedIds = [];
let selected = null;
let score = 0;
let mistakes = 0;
let shakingIds = [];
let draggedGroupId = null;
let dropTarget = null;

const STATS_ENDPOINT = "https://script.google.com/macros/s/AKfycbwETt_HnVvm_TEdPRmLl21DCYoWVptr6KT4l-iX4aBeQNDaCd2-9vHcC2ISAtXN_pAt/exec";
const STATS_PLAYER_KEY = "word-game-stats-player";
const STATS_FIRST_CATEGORY_PREFIX = "word-game-first-category-";

/* =========================================
   УТИЛИТЫ
   ========================================= */

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getCategoryById(id) {
  return categories.find(c => c.id === id);
}

function validateData() {
  const ids = new Set();

  for (const category of categories) {
    if (!category.id) {
      throw new Error("У категории нет id");
    }

    if (ids.has(category.id)) {
      throw new Error(`Повторяющийся id категории: ${category.id}`);
    }

    ids.add(category.id);

    if (!Array.isArray(category.words)) {
      throw new Error(`У категории ${category.id} words должен быть массивом`);
    }

    if (category.words.length !== SIZE) {
      throw new Error(
        `В категории "${category.title}" должно быть ровно ${SIZE} слов. Сейчас: ${category.words.length}`
      );
    }
  }
}

function clampWordsForTile(words, separator = " - ") {
  if (!words || words.length === 0) return "";

  const maxChars = 42;
  let result = "";

  for (let i = 0; i < words.length; i++) {
    const candidate = result ? result + separator + words[i] : words[i];

    if (candidate.length <= maxChars) {
      result = candidate;
    } else {
      if (!result) {
        return words[i].slice(0, maxChars - 1) + "…";
      }
      return result + "…";
    }
  }

  return result;
}

function escapeHTML(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function getGroupText(group) {
  if (group.completed) {
    return `<span class="tile-text">${escapeHTML(group.title)}</span>`;
  }

  const text = group.words.join(WORD_SEPARATOR);

  if (group.words.length > 1) {
    return `<span class="tile-count">${group.words.length}</span><span class="tile-text">${escapeHTML(text)}</span>`;
  }

  return `<span class="tile-text">${escapeHTML(text)}</span>`;
}

function getTooltipText(group) {
  if (group.completed) {
    return `${group.title}: ${group.words.join(", ")}`;
  }
  return group.words.join(", ");
}

function findPosition(groupId) {
  for (let rowIndex = 0; rowIndex < activeRows.length; rowIndex++) {
    const indexInRow = activeRows[rowIndex].indexOf(groupId);
    if (indexInRow !== -1) {
      return { rowIndex, indexInRow };
    }
  }
  return null;
}

function removeFromRow(groupId) {
  const pos = findPosition(groupId);
  if (!pos) return;

  activeRows[pos.rowIndex].splice(pos.indexInRow, 1);

  if (activeRows[pos.rowIndex].length === 0) {
    activeRows.splice(pos.rowIndex, 1);
  }
}

function moveGroupNearTarget(groupId, targetGroupId, position) {
  const source = findPosition(groupId);
  const target = findPosition(targetGroupId);

  if (!source || !target) return;

  activeRows[source.rowIndex].splice(source.indexInRow, 1);

  let targetRowIndex = target.rowIndex;
  let targetIndex = target.indexInRow;

  if (source.rowIndex === target.rowIndex && source.indexInRow < targetIndex) {
    targetIndex--;
  }

  if (activeRows[source.rowIndex].length === 0) {
    activeRows.splice(source.rowIndex, 1);

    if (source.rowIndex < targetRowIndex) {
      targetRowIndex--;
    }
  }

  const targetRow = activeRows[targetRowIndex];
  const insertIndex = position === "after" ? targetIndex + 1 : targetIndex;
  targetRow.splice(insertIndex, 0, groupId);

  saveState();
  render();
}

function getDropPosition(event, tile) {
  const rect = tile.getBoundingClientRect();
  const middle = rect.left + rect.width / 2;
  return event.clientX < middle ? "before" : "after";
}

function clearDropTarget() {
  dropTarget = null;
}

function setCleanDragImage(event, tile) {
  const rect = tile.getBoundingClientRect();
  const preview = tile.cloneNode(true);

  preview.classList.add("drag-preview");
  preview.classList.remove("dragging", "selected", "drop-before", "drop-after");
  preview.removeAttribute("data-tooltip");
  preview.style.width = `${rect.width}px`;
  preview.style.height = `${rect.height}px`;

  document.body.appendChild(preview);
  event.dataTransfer.setDragImage(preview, rect.width / 2, rect.height / 2);

  requestAnimationFrame(() => {
    preview.remove();
  });
}

function getStatsPlayer() {
  const saved = localStorage.getItem(STATS_PLAYER_KEY);

  if (saved) {
    try {
      return JSON.parse(saved);
    } catch (e) {
      localStorage.removeItem(STATS_PLAYER_KEY);
    }
  }

  const suffix = Math.random().toString(36).slice(2, 8);
  const player = {
    id: `player-${suffix}-${Date.now().toString(36)}`,
    nickname: `игрок-${suffix}`
  };

  localStorage.setItem(STATS_PLAYER_KEY, JSON.stringify(player));
  return player;
}

function getFirstCategoryKey() {
  const player = getStatsPlayer();
  return `${STATS_FIRST_CATEGORY_PREFIX}${player.id}-${currentLevelId}`;
}

function getFirstCompletedCategory() {
  return localStorage.getItem(getFirstCategoryKey()) || "";
}

function rememberFirstCompletedCategory(categoryTitle) {
  const key = getFirstCategoryKey();
  const saved = localStorage.getItem(key);

  if (saved) return saved;

  localStorage.setItem(key, categoryTitle);
  return categoryTitle;
}

function sendStatsEvent(eventType, extra = {}) {
  if (!STATS_ENDPOINT) return;

  const player = getStatsPlayer();
  const payload = {
    playerId: player.id,
    nickname: player.nickname,
    levelId: currentLevelId,
    eventType,
    score,
    completedCount: completedIds.length,
    firstCompletedCategory: getFirstCompletedCategory(),
    userAgent: navigator.userAgent,
    ...extra
  };

  try {
    fetch(STATS_ENDPOINT, {
      method: "POST",
      mode: "no-cors",
      keepalive: true,
      headers: {
        "Content-Type": "text/plain;charset=UTF-8"
      },
      body: JSON.stringify(payload)
    }).catch(() => {});
  } catch (e) {
    // Статистика не должна мешать игре.
  }
}

function launchConfetti() {
  const canvas = document.getElementById("confettiCanvas");
  const context = canvas.getContext("2d");
  const colors = ["#6f4e37", "#d9a441", "#b65f46", "#4f7f6f", "#8b5d8f"];
  const pieces = [];
  const duration = 2600;
  const startedAt = performance.now();
  const pixelRatio = window.devicePixelRatio || 1;

  canvas.hidden = false;
  canvas.width = Math.floor(window.innerWidth * pixelRatio);
  canvas.height = Math.floor(window.innerHeight * pixelRatio);
  context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);

  for (let i = 0; i < 150; i++) {
    pieces.push({
      x: Math.random() * window.innerWidth,
      y: -20 - Math.random() * window.innerHeight * 0.35,
      size: 5 + Math.random() * 7,
      speed: 2.2 + Math.random() * 4,
      drift: -1.5 + Math.random() * 3,
      rotation: Math.random() * Math.PI,
      rotationSpeed: -0.18 + Math.random() * 0.36,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }

  function draw(now) {
    const progress = Math.min(1, (now - startedAt) / duration);

    context.clearRect(0, 0, window.innerWidth, window.innerHeight);

    pieces.forEach(piece => {
      piece.x += piece.drift;
      piece.y += piece.speed;
      piece.rotation += piece.rotationSpeed;

      context.save();
      context.globalAlpha = 1 - Math.max(0, progress - 0.75) / 0.25;
      context.translate(piece.x, piece.y);
      context.rotate(piece.rotation);
      context.fillStyle = piece.color;
      context.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size * 0.55);
      context.restore();
    });

    if (progress < 1) {
      requestAnimationFrame(draw);
    } else {
      context.clearRect(0, 0, window.innerWidth, window.innerHeight);
      canvas.hidden = true;
    }
  }

  requestAnimationFrame(draw);
}

function handleLevelCompleted() {
  launchConfetti();

  sendStatsEvent("level_completed", {
    categoryTitle: "",
    firstCompletedCategory: getFirstCompletedCategory()
  });
}

function saveState() {
  const state = {
    groups,
    activeRows,
    completedIds,
    score,
    mistakes
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;

  try {
    const state = JSON.parse(raw);
    groups = state.groups || {};
    activeRows = state.activeRows || [];
    completedIds = state.completedIds || [];
    score = state.score || 0;
    mistakes = state.mistakes || 0;
    selected = null;
    shakingIds = [];
    return true;
  } catch (e) {
    return false;
  }
}

function clearState() {
  localStorage.removeItem(STORAGE_KEY);
}

function setLevel(levelId) {
  if (!LEVELS[levelId]) return;

  currentLevelId = levelId;
  localStorage.setItem("word-game-current-level", currentLevelId);
  STORAGE_KEY = getCurrentLevel().storageKey;
  categories = getCurrentLevel().categories;

  selected = null;
  shakingIds = [];
  draggedGroupId = null;
  dropTarget = null;

  const loaded = loadState();
  if (!loaded) {
    createInitialGame();
  }

  render();
}

function updateLevelButtons() {
  document.querySelectorAll(".level-btn").forEach(button => {
    button.classList.toggle("active-level", button.dataset.level === currentLevelId);
  });
}

/* =========================================
   СОЗДАНИЕ ИГРЫ
   ========================================= */

function createInitialGame() {
  let all = [];

  categories.forEach(category => {
    category.words.forEach((word, i) => {
      all.push({
        id: `${category.id}_${i}`,
        word,
        category: category.id,
        title: category.title
      });
    });
  });

  all = shuffle(all);

  groups = {};
  activeRows = [];
  completedIds = [];
  selected = null;
  score = 0;
  mistakes = 0;
  shakingIds = [];

  all.forEach(item => {
    groups[item.id] = {
      id: item.id,
      words: [item.word],
      category: item.category,
      title: item.title,
      completed: false
    };
  });

  for (let i = 0; i < all.length; i += ITEMS_PER_ROW) {
    activeRows.push(all.slice(i, i + ITEMS_PER_ROW).map(item => item.id));
  }

  saveState();
}

/* =========================================
   РЕНДЕР
   ========================================= */

function renderCompleted() {
  const container = document.getElementById("completedGrid");
  container.innerHTML = "";

  completedIds.forEach(groupId => {
    const group = groups[groupId];
    if (!group) return;

    const tile = document.createElement("div");
    tile.className = "tile completed";

    const category = getCategoryById(group.category);
    if (category) {
      tile.style.backgroundColor = category.color;
      tile.style.borderColor = category.borderColor;
    }

    if (selected === group.id) {
      tile.classList.add("selected");
    }

    if (shakingIds.includes(group.id)) {
      tile.classList.add("shake");
    }

    tile.innerHTML = getGroupText(group);
    tile.title = getTooltipText(group);
    tile.onclick = () => clickGroup(group.id);

    container.appendChild(tile);
  });
}

function renderRows() {
  const rowsEl = document.getElementById("rows");
  rowsEl.innerHTML = "";

  activeRows.forEach(rowIds => {
    const rowEl = document.createElement("div");
    rowEl.className = "row";

    rowIds.forEach(groupId => {
      const group = groups[groupId];
      if (!group) return;

      const tile = document.createElement("div");
      tile.className = "tile";
      tile.dataset.groupId = group.id;

      if (selected === group.id) {
        tile.classList.add("selected");
      }

      if (group.completed) {
        tile.classList.add("completed");
      }

      if (group.words.length > 1 && !group.completed) {
        tile.classList.add("merged", "draggable");
        tile.draggable = true;
        tile.dataset.tooltip = getTooltipText(group);
      }

      if (draggedGroupId === group.id) {
        tile.classList.add("dragging");
      }

      if (dropTarget && dropTarget.groupId === group.id) {
        tile.classList.add(dropTarget.position === "before" ? "drop-before" : "drop-after");
      }

      if (shakingIds.includes(group.id)) {
        tile.classList.add("shake");
      }

      tile.innerHTML = getGroupText(group);
      tile.onclick = () => clickGroup(group.id);

      tile.addEventListener("dragstart", event => {
        if (group.words.length <= 1 || group.completed) {
          event.preventDefault();
          return;
        }

        draggedGroupId = group.id;
        selected = null;
        document.body.classList.add("is-dragging");
        tile.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", group.id);
        setCleanDragImage(event, tile);
      });

      tile.addEventListener("dragover", event => {
        if (!draggedGroupId || draggedGroupId === group.id) return;

        event.preventDefault();

        const position = getDropPosition(event, tile);
        dropTarget = { groupId: group.id, position };

        document.querySelectorAll(".tile.drop-before, .tile.drop-after").forEach(el => {
          el.classList.remove("drop-before", "drop-after");
        });

        tile.classList.add(position === "before" ? "drop-before" : "drop-after");
      });

      tile.addEventListener("dragleave", () => {
        tile.classList.remove("drop-before", "drop-after");
      });

      tile.addEventListener("drop", event => {
        if (!draggedGroupId || draggedGroupId === group.id) return;

        event.preventDefault();

        const groupToMove = draggedGroupId;
        const targetGroupId = group.id;
        const targetPosition = dropTarget ? dropTarget.position : "before";

        draggedGroupId = null;
        document.body.classList.remove("is-dragging");
        clearDropTarget();
        moveGroupNearTarget(groupToMove, targetGroupId, targetPosition);
      });

      tile.addEventListener("dragend", () => {
        draggedGroupId = null;
        document.body.classList.remove("is-dragging");
        clearDropTarget();
        document.querySelectorAll(".tile.dragging, .tile.drop-before, .tile.drop-after").forEach(el => {
          el.classList.remove("dragging", "drop-before", "drop-after");
        });
      });

      rowEl.appendChild(tile);
    });

    rowsEl.appendChild(rowEl);
  });
}

function renderStats() {
  document.getElementById("score").innerText = score;
  document.getElementById("mistakes").innerText = mistakes;
  document.getElementById("completedCount").innerText = completedIds.length;
}

function render() {
  renderStats();
  renderCompleted();
  renderRows();
  updateLevelButtons();
}

/* =========================================
   ЛОГИКА ИГРЫ
   ========================================= */

function clickGroup(id) {
  if (selected === null) {
    selected = id;
    render();
    return;
  }

  if (selected === id) {
    selected = null;
    render();
    return;
  }

  merge(selected, id);
  selected = null;
}

function merge(a, b) {
  const A = groups[a];
  const B = groups[b];

  if (!A || !B) return;
  if (A.completed || B.completed) return;

  if (A.category !== B.category) {
    mistakes++;
    saveState();
    triggerShake([a, b]);
    return;
  }

  const mergedWords = [...A.words, ...B.words];
  const categoryCompleted = mergedWords.length === SIZE;

  groups[b] = {
    ...B,
    words: mergedWords,
    completed: categoryCompleted
  };

  delete groups[a];
  removeFromRow(a);

  if (groups[b].completed) {
    removeFromRow(b);
    completedIds.push(b);
  }

  score++;
  saveState();
  sendStatsEvent("connection");

  if (categoryCompleted) {
    const firstCompletedCategory = rememberFirstCompletedCategory(B.title);
    sendStatsEvent("category_completed", {
      categoryTitle: B.title,
      firstCompletedCategory
    });

    if (completedIds.length === categories.length) {
      handleLevelCompleted();
    }
  }

  render();
}

function triggerShake(ids) {
  shakingIds = ids;
  render();

  setTimeout(() => {
    shakingIds = [];
    render();
  }, 320);
}

/* =========================================
   УПРАВЛЕНИЕ
   ========================================= */

function newGame() {
  clearState();
  createInitialGame();
  render();
}

function init() {
  categories = getCurrentLevel().categories;
  STORAGE_KEY = getCurrentLevel().storageKey;

  validateData();

  const loaded = loadState();
  if (!loaded) {
    createInitialGame();
  }

  render();
  sendStatsEvent("visit");
}

document.getElementById("newGameBtn").addEventListener("click", newGame);
document.getElementById("level1Btn").addEventListener("click", () => setLevel("level1"));
document.getElementById("level2Btn").addEventListener("click", () => setLevel("level2"));

init();
